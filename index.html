<!DOCTYPE html>
<html>
    <head>
        <title>Collection Levels</title>

        <style>
            body{background-color: lightgray;}

            nav ul{height:900px; width:calc(100% - 40px);}
            nav ul{overflow:hidden; overflow-y:scroll;}
            nav ul{background-color: gray;}
        </style>
    </head>
    <body>
        <div id="loading" style="height: 0px;">
            <h1>Loading...</h1>
        </div>

        <div id="content">

            <div style="display: flex; gap: 5px; height: 40px;">
                <div style="width: 35px; height:40px;"></div>
                <div style="width: 140px; height:40px;">
                    <p>Level</p>
                </div>
                <div style="width: 350px; height:40px;">
                    <p>Reward</p>
                </div>
                <div style="width: 150px; height:40px;">
                    <p>Amount</p>
                </div>
            </div>

            <nav style="margin: 0px;">
                <ul id="list" style="margin: 0px;">

                </ul>
            </nav>
        </div>

        <script>
            var rewards = [];

            function updateList()
            {
                var list = document.getElementById("list");
                list.innerHTML = "";

                rewards.forEach(element => {

                    var image = "";
                    var text = "";

                    text = element["reward"];

                    if (text == '"Diamonds"') image = "assets/gems.webp";
                    if (text == '"WildcardCommon"') image = "assets/wildcard_common.png";
                    if (text == '"WildcardRare"') image = "assets/wildcard_rare.png";
                    if (text == '"WildcardEpic"') image = "assets/wildcard_epic.png";
                    if (text == '"WildcardLegendary"') image = "assets/wildcard_legendary.png";
                    if (text == '"WildcardChampion"') image = "assets/wildcard_champion.png";
                    if (text == '"ChampionLuckyDrop"') image = "assets/Item_Lucky_Drop_Legendary_01.png";
                    if (text == '"LegendaryLuckyDrop_NoUpgrade"') image = "assets/Item_Lucky_Drop_Legendary_02.png";
                    if (text == '"EVO_Shard_5Star"') image = "assets/5starevo.png";

                    var stri =
                    `<div style="display: flex; gap: 5px; height: 40px;">
                        <div style="width: 140px; height:40px;">
                            <p>${element["level"]}</p>
                        </div>
                        <div style="width: 350px; height:40px;">
                            ${image.length > 0 ?
                                `<img src="${image}" style="max-height: 35px; width: auto;"></img>` :
                                `<p>${text}</p>`}
                        </div>
                        <div style="width: 150px; height:40px;">
                            <p>${element["amount"]}</p>
                        </div>
                    </div>`;

                    const cell = document.createElement('div');
                    cell.innerHTML = stri;

                    list.appendChild(cell.firstElementChild);
                });
            }

            function loaded(data)
            {
                document.getElementById("loading").style.visibility = "hidden";
                document.getElementById("content").style.visibility = "visible";

                const lines = data.split("\n");

                const keys = lines[0].split(",");

                var iter = 0;
                lines.forEach(line => {
                    iter++;

                    if (iter <= 2)
                        return;

                    const parts = line.split(",");

                    rewards.push(
                    {
                        "level": parts[keys.indexOf('"RequiredLevel"')],
                        "reward": parts[keys.indexOf('"Resource"')] || parts[keys.indexOf('"Consumable"')] || parts[keys.indexOf('"MysteryBox"')] || parts[keys.indexOf('"Banner"')],
                        "isKey": parts[keys.indexOf('"IsKey"')],
                        "amount": parts[keys.indexOf('"Amount"')],
                        "chest": parts[keys.indexOf('"Chest"')],
                        "token": parts[keys.indexOf('"Token"')],
                        "consumable": parts[keys.indexOf('"Consumable"')],
                        "mysteryBox": parts[keys.indexOf('"MysteryBox"')],
                        "chestArena": parts[keys.indexOf('"ChestArena"')],
                        "evoShard": parts[keys.indexOf('"EvoShard"')],
                        "rulerCard": parts[keys.indexOf('"RulerCard"')],
                        "skinSet": parts[keys.indexOf('"SkinSet"')],
                        "emoteIDHigh": parts[keys.indexOf('"EmoteIDHigh"')],
                        "emoteIDLow": parts[keys.indexOf('"EmoteIDLow"')],
                    });

                    /*rewards.push(
                    {
                        "name": parts[keys.indexOf('"Name"')],
                        "level": parts[keys.indexOf('"RequiredLevel"')],
                        "isKey": parts[keys.indexOf('"IsKey"')],
                        "amount": parts[keys.indexOf('"Amount"')],
                        "spell": parts[keys.indexOf('"Spell"')],
                        "spellAlt": parts[keys.indexOf('"SpellAlt"')],
                        "resource": parts[keys.indexOf('"Resource"')],
                        "chest": parts[keys.indexOf('"Chest"')],
                        "token": parts[keys.indexOf('"Token"')],
                        "consumable": parts[keys.indexOf('"Consumable"')],
                        "supportCard": parts[keys.indexOf('"SupportCard"')],
                        "supportCardAlt": parts[keys.indexOf('"SupportCardAlt"')],
                        "randomSupportCard": parts[keys.indexOf('"RandomSupportCard"')],
                        "mysteryBox": parts[keys.indexOf('"MysteryBox"')],
                        "chestArena": parts[keys.indexOf('"ChestArena"')],
                        "evoShard": parts[keys.indexOf('"EvoShard"')],
                        "rulerCard": parts[keys.indexOf('"RulerCard"')],
                        "skinSet": parts[keys.indexOf('"SkinSet"')],
                        "emoteIDHigh": parts[keys.indexOf('"EmoteIDHigh"')],
                        "emoteIDLow": parts[keys.indexOf('"EmoteIDLow"')],
                        "banner": parts[keys.indexOf('"Banner"')],
                    });*/
                });

                updateList();
            }

            function onEventUpdateList(event)
            {
                updateList();
            }

            document.getElementById("loading").style.visibility = "visible";
            document.getElementById("content").style.visibility = "hidden";

            fetch("https://raw.githubusercontent.com/TheSillyDoggo/collectionlevels/refs/heads/main/collection_levels.csv")
                .then((res) => {
                    if (!res.ok) {
                        throw new Error
                            (`HTTP error! Status: ${res.status}`);
                    }
                    return res.text();
                })
                .then((data) =>
                    loaded(data)
                )
                .catch((error) =>
                    console.error("Unable to fetch data:", error));
        </script>
    </body>
</html>
